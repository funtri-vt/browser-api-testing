<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Injected Context API & Storage Suite</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --success: #4ade80;
            --fail: #f87171;
            --warning: #fbbf24;
            --border: #334155;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        h1 { margin: 0; font-size: 1.8rem; font-weight: 700; }
        h1 span { color: var(--accent); }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .grid { grid-template-columns: 1fr 1fr; }
            .span-2 { grid-column: span 2; }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1.5rem;
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 1rem;
            font-size: 1.3rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        .test-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .test-item:last-child { border-bottom: none; }
        .test-info h3 { margin: 0; font-size: 1rem; font-weight: 500; }
        .test-info p { margin: 0; font-size: 0.85rem; color: var(--text-muted); }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge.pass { background-color: rgba(74, 222, 128, 0.15); color: var(--success); }
        .badge.fail { background-color: rgba(248, 113, 113, 0.15); color: var(--fail); }
        .badge.warn { background-color: rgba(251, 191, 36, 0.15); color: var(--warning); }
        .badge.running { background-color: rgba(56, 189, 248, 0.15); color: var(--accent); }

        .meta-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 0.375rem;
            margin-bottom: 1rem;
            font-family: monospace;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Context Suite: <span>about:blank Diagnostics</span></h1>
        <p style="color: var(--text-muted); margin: 0.25rem 0 0 0;">Auto-executing capabilities test for injected document streams</p>
    </header>

    <div class="grid">
        <div class="card span-2">
            <h2>Environment & Origin Assessment</h2>
            <div class="meta-box" id="envLog">Evaluating current execution context...</div>
        </div>

        <div class="card">
            <h2>Storage & Quotas</h2>
            <div class="meta-box" id="quotaDisplay">Calculating availability...</div>
            <div id="storageTests"></div>
        </div>

        <div class="card">
            <h2>Core API Availability</h2>
            <div id="apiTests"></div>
        </div>
    </div>
</div>

<script>
    const storageTestDefinitions = [
        {
            name: "LocalStorage Access",
            desc: "Synchronous key-value storage availability.",
            test: async () => {
                localStorage.setItem('__blank_test__', 'active');
                const val = localStorage.getItem('__blank_test__');
                localStorage.removeItem('__blank_test__');
                return val === 'active' ? {status: 'pass', details: 'Writable'} : {status: 'fail'};
            }
        },
        {
            name: "IndexedDB Allocation",
            desc: "Asynchronous transactional database initialization.",
            test: () => {
                return new Promise((resolve) => {
                    if (!window.indexedDB) resolve({status: 'fail', details: 'Object missing'});
                    const request = indexedDB.open('__blank_db__', 1);
                    request.onsuccess = (e) => {
                        const db = e.target.result;
                        db.close();
                        indexedDB.deleteDatabase('__blank_db__');
                        resolve({status: 'pass', details: 'Database accessible'});
                    };
                    request.onerror = () => resolve({status: 'fail', details: 'SecurityError / Blocked'});
                });
            }
        },
        {
            name: "Cache API Support",
            desc: "Request/Response isolation caching.",
            test: async () => {
                if (!('caches' in window)) return {status: 'fail'};
                const cache = await caches.open('__blank_cache__');
                await cache.put(new Request('https://test.local'), new Response('valid'));
                await caches.delete('__blank_cache__');
                return {status: 'pass', details: 'Operational'};
            }
        },
        {
            name: "Storage Persistence Status",
            desc: "Eviction classification from the user agent.",
            test: async () => {
                if (!navigator.storage || !navigator.storage.persisted) return {status: 'warn', details: 'API unavailable'};
                const persistent = await navigator.storage.persisted();
                return persistent ? {status: 'pass', details: 'Persistent'} : {status: 'warn', details: 'Best-Effort (Subject to eviction)'};
            }
        }
    ];

    const apiTestDefinitions = [
        {
            name: "Service Workers",
            desc: "Background network proxy registration control.",
            test: async () => ('serviceWorker' in navigator) ? {status: 'pass', details: 'Supported'} : {status: 'fail'}
        },
        {
            name: "Web Workers",
            desc: "Thread spawning abstraction outside UI loop.",
            test: async () => (typeofWorker !== "undefined" || window.Worker) ? {status: 'pass', details: 'Supported'} : {status: 'fail'}
        },
        {
            name: "WebSockets",
            desc: "Persistent stateful socket connection ability.",
            test: async () => ('WebSocket' in window) ? {status: 'pass', details: 'Supported'} : {status: 'fail'}
        }
    ];

    function renderItems(containerId, definitions) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        definitions.forEach((item, index) => {
            const row = document.createElement('div');
            row.className = 'test-item';
            row.innerHTML = `
                <div class="test-info">
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                    <small id="${containerId}-details-${index}" style="color: var(--accent); display:none;"></small>
                </div>
                <div>
                    <span id="${containerId}-badge-${index}" class="badge running">Testing</span>
                </div>
            `;
            container.appendChild(row);
        });
    }

    async function evaluateEnvironment() {
        const envLog = document.getElementById('envLog');
        let currentOrigin = "Unknown";
        try { currentOrigin = window.origin || window.location.origin; } catch(e) { currentOrigin = "Opaque/Blocked"; }

        const hasOpener = !!window.opener;
        let policyStatus = "Inherited Security Context";
        
        if (currentOrigin === 'null' || currentOrigin.includes('opaque')) {
            policyStatus = "Opaque Origin (Sandboxed Isolation)";
        }

        envLog.innerHTML = `Location Context: <strong>${window.location.href}</strong>\n` +
                           `Resolved Origin:  <strong>${currentOrigin}</strong>\n` +
                           `Opener Linkage:   <strong>${hasOpener ? "Connected" : "Disconnected/Null"}</strong>\n` +
                           `Execution Status: <strong>${policyStatus}</strong>`;
    }

    async function executeTests(containerId, definitions) {
        for(let i = 0; i < definitions.length; i++) {
            const badge = document.getElementById(`${containerId}-badge-${i}`);
            const detailEl = document.getElementById(`${containerId}-details-${i}`);
            try {
                const result = await definitions[i].test();
                badge.className = `badge ${result.status}`;
                badge.innerText = result.status;
                if(result.details) {
                    detailEl.innerText = result.details;
                    detailEl.style.display = 'block';
                }
            } catch (err) {
                badge.className = 'badge fail';
                badge.innerText = 'error';
                detailEl.innerText = err.message;
                detailEl.style.display = 'block';
                console.error(err);
            }
        }
    }

    async function calculateQuota() {
        const display = document.getElementById('quotaDisplay');
        if (navigator.storage && navigator.storage.estimate) {
            try {
                const {usage, quota} = await navigator.storage.estimate();
                display.innerHTML = `Allocated: <strong>${(quota / (1024*1024*1024)).toFixed(2)} GB</strong>\nUsed: <strong>${(usage / (1024*1024)).toFixed(2)} MB</strong>`;
            } catch(e) {
                display.innerText = "Quota check rejected: " + e.message;
            }
        } else {
            display.innerText = "Estimation API unavailable in this scope.";
        }
    }

    // Auto-initiation workflow on stream injection completion
    window.addEventListener('DOMContentLoaded', async () => {
        await evaluateEnvironment();
        renderItems('storageTests', storageTestDefinitions);
        renderItems('apiTests', apiTestDefinitions);
        
        // Brief timeout ensuring complete document layout commitment
        setTimeout(async () => {
            await calculateQuota();
            await executeTests('storageTests', storageTestDefinitions);
            await executeTests('apiTests', apiTestDefinitions);
        }, 200);
    });
</script>
</body>
</html>
